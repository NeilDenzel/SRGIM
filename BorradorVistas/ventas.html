<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SRGIM - Ventas</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Módulo de Ventas del día del sistema de inventario de bodega SRGIM. Control de transacciones diarias.">
  <meta name="author" content="SRGIM Team">
  
  <!-- Google Fonts for Premium Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ========================================================
       PALETA SRGIM (BODEGA):
       Verde:  #d4e8d0 (Header)
       Crema:  #fdf6dd (Fondo Nav, Botones)
       Gris:   #9aa3b5 (Bordes de tarjetas)
       Texto:  #1a1a1a
       ======================================================== */
    :root {
      --verde: #d4e8d0;
      --verde-dark: #c0dbbb;
      --crema: #fdf6dd;
      --crema-dark: #f8ebb4;
      --borde: #9aa3b5;
      --texto: #1a1a1a;
      --texto-gris: #788294;
      --blanco: #ffffff;
      --espacio: 16px;
      --nav-alto: 68px;
      --border-radius-sm: 4px;
      --shadow-sm: 0 2px 4px rgba(154, 163, 181, 0.15);
      --shadow-md: 0 4px 10px rgba(154, 163, 181, 0.25);
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--blanco);
      color: var(--texto);
      min-height: 100vh;
      padding-bottom: calc(var(--nav-alto) + 24px); /* Espacio para que el bottom nav no tape el contenido */
    }

    /* ---------- HEADER ---------- */
    .app-header {
      background-color: var(--verde);
      border-bottom: 3px solid var(--borde);
      padding: 14px var(--espacio);
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow-sm);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-logo {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--texto);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-role-link {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.4);
      padding: 4px 10px;
      border: 2px solid var(--borde);
      border-radius: var(--border-radius-sm);
      color: var(--texto);
      text-decoration: none;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .header-role-link:hover {
      background-color: var(--blanco);
      border-color: var(--texto);
      transform: translateY(-1px);
    }

    /* ---------- CONTENIDO ---------- */
    .contenido {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px var(--espacio);
    }

    /* ---------- TARJETA RESUMEN DEL DÍA ---------- */
    .resumen-dia {
      border: 3px solid var(--borde);
      background-color: var(--blanco);
      padding: 18px 24px;
      margin-bottom: 24px;
      border-radius: var(--border-radius-sm);
      box-shadow: var(--shadow-sm);
      position: relative;
    }

    /* Sombra rígida retro para emular los bocetos */
    .resumen-dia::after {
      content: '';
      position: absolute;
      bottom: -6px;
      right: -6px;
      width: 100%;
      height: 100%;
      border: 3px solid var(--borde);
      border-radius: var(--border-radius-sm);
      z-index: -1;
      pointer-events: none;
    }

    .resumen-dia .fecha {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--texto-gris);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .resumen-dia .monto {
      font-family: 'Outfit', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--texto);
      margin-bottom: 6px;
    }

    .resumen-dia .conteo {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--texto-gris);
      background: var(--crema);
      padding: 4px 10px;
      display: inline-block;
      border: 1px solid var(--borde);
      border-radius: var(--border-radius-sm);
    }

    /* ---------- SUBTITULO ---------- */
    .subtitulo {
      font-family: 'Outfit', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--texto);
      border-left: 4px solid var(--borde);
      padding-left: 8px;
    }

    /* ---------- TARJETA DE VENTA ---------- */
    .venta-card {
      border: 3px solid var(--borde);
      background: var(--blanco);
      padding: 16px var(--espacio);
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
      border-radius: var(--border-radius-sm);
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      flex-wrap: wrap;
    }

    .venta-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      border-color: var(--texto);
    }

    .venta-icono {
      width: 44px;
      height: 44px;
      min-width: 44px;
      border: 3px solid var(--borde);
      border-radius: var(--border-radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--crema);
      color: var(--texto);
      transition: var(--transition);
    }

    .venta-card:hover .venta-icono {
      background-color: var(--verde);
      border-color: var(--texto);
    }

    .venta-nombre {
      font-weight: 700;
      font-size: 1.05rem;
      flex: 1;
      min-width: 120px;
      color: var(--texto);
    }

    .venta-precios {
      display: flex;
      gap: 28px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--texto-gris);
      flex-wrap: wrap;
    }

    .venta-precios span {
      background: #f7f9fa;
      padding: 6px 12px;
      border: 1px solid var(--borde);
      border-radius: var(--border-radius-sm);
    }

    .btn-vermas {
      background-color: var(--crema);
      border: 3px solid var(--borde);
      border-radius: var(--border-radius-sm);
      padding: 8px 18px;
      font-size: 0.8rem;
      font-weight: 700;
      font-family: inherit;
      color: var(--texto);
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 2px 2px 0px var(--borde);
    }

    .btn-vermas:hover { 
      background-color: var(--crema-dark); 
      transform: translate(-1px, -1px);
      box-shadow: 3px 3px 0px var(--borde);
    }

    .btn-vermas:active {
      transform: translate(1px, 1px);
      box-shadow: 1px 1px 0px var(--borde);
    }

    /* ---------- NAVEGACIÓN INFERIOR ---------- */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: var(--nav-alto);
      background-color: var(--crema);
      border-top: 3px solid var(--borde);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 100;
      box-shadow: 0 -3px 10px rgba(154, 163, 181, 0.15);
    }

    .bottom-nav a {
      text-decoration: none;
      color: var(--texto-gris);
      font-size: 0.85rem;
      font-weight: 700;
      padding: 8px 12px;
      font-family: 'Outfit', sans-serif;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      width: 20%;
      text-align: center;
    }

    .bottom-nav a svg {
      stroke: var(--texto-gris);
      transition: var(--transition);
    }

    .bottom-nav a:hover {
      color: var(--texto);
      background-color: rgba(253, 246, 221, 0.5);
    }

    .bottom-nav a.activo {
      color: var(--texto);
      font-weight: 800;
      border-top: 3px solid var(--texto);
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .bottom-nav a.activo svg {
      stroke: var(--texto);
    }

    /* ============================================
       RESPONSIVE
       ============================================ */

    /* Celular */
    @media (max-width: 600px) {
      .venta-card {
        flex-direction: column;
        align-items: flex-start;
        padding: 16px;
      }
      
      .venta-precios {
        width: 100%;
        justify-content: space-between;
        gap: 12px;
      }

      .venta-precios span {
        flex: 1;
        text-align: center;
      }

      .btn-vermas { 
        width: 100%; 
        text-align: center; 
        padding: 12px; 
      }
      
      .resumen-dia .monto { font-size: 1.8rem; }
      
      .bottom-nav a { 
        font-size: 0.75rem; 
        padding: 4px;
        gap: 1px;
      }
    }

    /* Laptop */
    @media (min-width: 1024px) {
      .contenido { padding: 40px var(--espacio); }
      .venta-card { padding: 18px 28px; }
      .venta-precios { gap: 40px; }
    }
  </style>
</head>
