<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRGIM - Administrador</title>

<style>

:root{
    --verde:#D9ECC8;
    --crema:#FFF8E7;
    --gris:#A9B0C1;
    --azul:#C4D1E7;
    --texto:#2d2d2d;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    background:#fff;
    color:var(--texto);
}

/* ENCABEZADO */

header{
    width:100%;
    height:45px;
    background:var(--verde);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 18px;
    font-size:18px;
}

header .titulo{
    font-weight:500;
}

header .usuario{
    font-weight:500;
}

/* CONTENIDO */

main{
    width:100%;
    padding:20px;
}

.opcion{
    width:100%;
    border:4px solid var(--gris);
    background:#fff;
    padding:18px;
    margin-bottom:18px;
    font-size:24px;
    cursor:pointer;
    transition:.3s;
}

.opcion:hover{
    background:var(--crema);
    border-color:var(--azul);
    transform:translateX(5px);
}

/* RESPONSIVE */

@media(max-width:768px){

header{
    font-size:16px;
}

.opcion{
    font-size:20px;
    padding:15px;
}

}

@media(max-width:480px){

header{
    padding:0 12px;
    font-size:14px;
}

.opcion{
    font-size:18px;
    padding:14px;
}

}

</style>

</head>
<body>

<header>

<div class="titulo">
SRGIM - INVENTARIO - Administrador
</div>

<div class="usuario">
Administrador
</div>

</header>

<main>

<div class="opcion">
Agregar Nuevo Usuario
</div>

<div class="opcion">
Ver Lista de Usuarios
</div>

</main>

</body>
</html>
