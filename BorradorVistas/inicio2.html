<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRGIM - Inventario</title>

<style>

:root{
    --verde:#D9ECC8;
    --crema:#FFF8E7;
    --gris:#A9B0C1;
    --azul:#C4D1E7;
    --blanco:#fff;
    --texto:#2e2e2e;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Tahoma,sans-serif;
}

body{
    background:#fff;
    color:var(--texto);
}

/* ENCABEZADO */

header{
    height:45px;
    background:var(--verde);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 18px;
    font-size:18px;
}

.usuario{
    font-weight:500;
}

/* PANEL SUPERIOR */

.panel{
    background:var(--crema);
    min-height:95px;

    display:flex;
    justify-content:space-around;
    align-items:center;
    padding:20px;
    flex-wrap:wrap;
    gap:20px;
}

.panel-item{
    display:flex;
    align-items:center;
    gap:15px;
    font-size:22px;
}

.icono{
    font-size:45px;
}

.add{
    cursor:pointer;
}

/*======================*/
/* CONTENIDO */
/*======================*/

.contenedor{
    padding:15px 25px 90px;
}

.tarjeta{
    display:flex;
    align-items:center;
    gap:15px;

    border:4px solid var(--gris);

    padding:12px;

    margin-bottom:16px;

    background:#fff;

    font-size:22px;
}

.tarjeta:hover{
    background:#f8f8f8;
}

.tarjeta input{

    width:100%;
    border:none;
    outline:none;
    font-size:22px;

}

/* MENU */

footer{

    position:fixed;

    bottom:0;

    left:0;

    width:100%;

    background:var(--crema);

    display:flex;

    justify-content:space-around;

    padding:18px 5px;

    border-top:2px solid #eee;

}

footer a{

    text-decoration:none;

    color:var(--gris);

    font-size:22px;

    font-weight:600;

}

footer a.active{

    color:#222;

}

/* RESPONSIVE */
@media(max-width:900px){

.panel{
    flex-direction:column;
}

.tarjeta{
    font-size:18px;
}

.tarjeta input{
    font-size:18px;
}

footer a{
    font-size:17px;
}

}

@media(max-width:600px){

header{
    font-size:15px;
}

.usuario{
    font-size:15px;
}

.panel-item{
    font-size:18px;
}

.icono{
    font-size:35px;
}

.tarjeta{
    font-size:16px;
    padding:10px;
}

.tarjeta input{
    font-size:16px;
}

footer{
    padding:15px 0;
}

footer a{
    font-size:14px;
}

}

</style>

</head>

<body>

<header>

<div>SRGIM - INVENTARIO</div>

<div class="usuario">Administrador</div>

</header>

<section class="panel">

<div class="panel-item">
<span class="icono"> </span>
<span>Productos por vencer: <b>1</b></span>
</div>

<div class="panel-item add">
<span class="icono"> </span>
<span>Agregar nuevo producto</span>
</div>

</section>

<div class="contenedor">

<div class="tarjeta">
<span>Productos por vencer: ProductoA, ProductoB</span>
</div>

<div class="tarjeta">
<input type="text" placeholder="Buscar...">
</div>

<div class="tarjeta">
<span>Producto</span>
</div>

<div class="tarjeta">
<span>Producto</span>
</div>

<div class="tarjeta">
<span>Producto</span>
</div>

<div class="tarjeta">
<span>Producto</span>
</div>

</div>

<footer>

<a href="#" class="active">Catalogo</a>

<a href="#">Ventas</a>

<a href="#">Alertas</a>

<a href="#">Caja</a>

<a href="#">Historial</a>

</footer>

</body>
</html>
